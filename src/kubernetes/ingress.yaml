apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinemaabyss-ingress
  namespace: cinemaabyss
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: cinemaabyss.example.com
    http:
      paths:
        # Все, что не «/api/events», идёт через proxy-service.
        - path: /
          pathType: Prefix
          backend:
            service:
              name: proxy-service
              port:
                number: 80
        # Исключение для /api/events — напрямую в events-service
        - path: /api/events
          pathType: Prefix
          backend:
            service:
              name: events-service
              port:
                number: 8082
